name: build

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    container: gradle:8.10-jdk25

    steps:
      - uses: actions/checkout@v5

      - name: Build with Gradle
        run: gradle clean build

      - name: Upload JAR
        uses: actions/upload-artifact@v5
        with:
          name: my-app-jar
          path: build/libs/*.jar
