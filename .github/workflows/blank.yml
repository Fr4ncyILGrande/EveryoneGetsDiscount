name: build

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    # Aggiornata da v4 a v5 per supportare Node.js 24
    - uses: actions/checkout@v5

    - name: Set up JDK 17
      # Aggiornata da v4 a v5
      uses: actions/setup-java@v5
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Gradle
      # Aggiornata da v3 a v4
      uses: gradle/actions/setup-gradle@v4

    - name: Build with Gradle
      run: gradle clean build

    - name: Upload JAR
      # Aggiornata da v4 a v5
      uses: actions/upload-artifact@v5
      with:
        name: my-app-jar
        path: build/libs/*.jar
